<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Open-Oriented-Hypothesis</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: system-ui; background:#0d1117; color:#c9d1d9; margin:40px; }
    h1 { color:#58a6ff; }
    canvas { background:#161b22; padding:20px; border-radius:8px; }
  </style>
</head>
<body>
  <h1>🛠️ Open-Oriented-Hypothesis</h1>
  <p>閉じてない仮説の鍛冶場 — 誰でも参加できる検証プラットフォーム</p>
  
  <h2>現在の検証状況（株価チャート波）</h2>
  <canvas id="waveChart" width="800" height="300"></canvas>

  <p><a href="https://github.com/st-578/Open-Oriented-Hypothesis/tree/main/templates">テンプレート一覧へ</a></p>
  <p>フォークして参加待機中！</p>

  <script>
    new Chart(document.getElementById('waveChart'), {
      type: 'line',
      data: {
        labels: ['現在', '3ヶ月後', '6ヶ月後', '9ヶ月後', '1年後'],
        datasets: [{
          label: '帰無仮説（変わらない）',
          data: [0, 0, 0, 0, 0],
          borderColor: '#ff5555',
          tension: 0.4
        }, {
          label: '法案側予測',
          data: [10, 25, 40, 55, 70],
          borderColor: '#58a6ff',
          tension: 0.4
        }]
      },
      options: { scales: { y: { beginAtZero: true } } }
    });
  </script>
</body>
</html>
